<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wildbus — sequencer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>wildbus</h1>
      <span class="subtitle">topic sequencer</span>

      <div class="transport">
        <button id="btn-play" class="play-btn">▶</button>
        <button id="btn-stop" class="stop-btn">■</button>
        <div class="bpm-group">
          <label>bpm</label>
          <input id="bpm-input" type="number" value="120" min="40" max="300" step="1" />
        </div>

        <span id="step-indicator" class="step-indicator">step 0 / 16</span>
      </div>

      <div class="header-actions">
        <button id="btn-clear">clear</button>
        <button id="btn-random">random</button>
      </div>
    </header>

    <main>
      <section id="tree-panel">
        <h2>topic tree</h2>
        <div id="tree-container"></div>
      </section>

      <section id="seq-panel">
        <div id="sequencer">
          <div class="row-labels" id="row-labels"></div>
          <div class="grid-scroll">
            <div class="step-numbers" id="step-numbers"></div>
            <div class="grid" id="grid"></div>
          </div>
        </div>

        <div id="subscriber-strip">
          <h2>subscribers</h2>
          <div id="subscriber-list"></div>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="main.ts"></script>
</body>
</html>
